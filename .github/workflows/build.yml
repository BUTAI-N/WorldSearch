name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - 'data/**'
      - 'scripts/**'
      - 'site/index.html'
      - 'site/app.js'
      - 'site/style.css'
      - '.github/workflows/build.yml'
  workflow_dispatch:
  schedule:
    # 毎週月曜 6:00 JST にサムネ等を再取得
    - cron: '0 21 * * 0'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build data
        run: node scripts/build.mjs
      - name: Commit cache and generated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .cache site/data.js site/data.json
          git diff --cached --quiet || git commit -m "chore: update world data [skip ci]"
          git push
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
